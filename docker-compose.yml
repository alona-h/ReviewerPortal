services:
  api:
    build: ./ReviewerPortal.API
    ports:
      - "5000:8080"
    environment:
      - UniversityApiBaseUrl=${UNIVERSITY_API_BASE_URL}

  frontend:
    build:
      context: ./ReviewerPortalWeb
      args:
        VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - api
